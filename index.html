<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Flight Notify V3</title><link rel='stylesheet' href='style.css'></head><body><div class='app'><h1>✈ Flight Notify</h1><div class='card'><div class="tabs">
