name: Update Flight Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Flight Fetcher
  env:
    AVIATIONSTACK_API_KEY: ${{ secrets.AVIATIONSTACK_API_KEY }}
  run: node scripts/fetchFlights.jss

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/flights.json
          git diff --cached --quiet || git commit -m "Update flights"
          git push